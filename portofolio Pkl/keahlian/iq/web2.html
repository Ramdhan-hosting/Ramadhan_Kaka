<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master - Ramadhan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', system-ui, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 3rem;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        /* Stats Bar */
        .stats-bar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #333;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            margin: 0 2rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 4px;
        }

        /* Question */
        .question-container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.6s ease forwards;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .question-number {
            color: #ff6b6b;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .question-text {
            font-size: 1.4rem;
            color: #333;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        /* Options */
        .options {
            display: grid;
            gap: 1rem;
        }

        .option {
            padding: 1.5rem 2rem;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .option:hover {
            border-color: #4ecdc4;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(78, 205, 196, 0.2);
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .option.selected {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }

        /* Buttons */
        .btn {
            padding: 1.2rem 3rem;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: white;
            margin: 0 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(255, 107, 107, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            margin: 0 0.5rem;
        }

        /* Result Modal */
        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .result-card {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            width: 90%;
            transform: scale(0.7);
            opacity: 0;
            animation: popIn 0.5s ease forwards;
        }

        @keyframes popIn {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .result-score {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        /* Footer */
        footer {
            background: rgba(255,255,255,0.95);
            padding: 2rem;
            text-align: center;
            color: #333;
            backdrop-filter: blur(20px);
        }

        .footer-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ff6b6b;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-bar {
                flex-direction: column;
                gap: 1rem;
            }
            
            .progress-bar {
                margin: 1rem 0;
                order: -1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1 class="logo">🧠 Quiz Master</h1>
            <p>Pilih jawaban yang benar untuk setiap pertanyaan!</p>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="questionNum">1</div>
                <div class="stat-label">Pertanyaan</div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="scoreNum">0</div>
                <div class="stat-label">Skor</div>
            </div>
        </div>

        <!-- Question -->
        <div class="question-container" id="questionContainer">
            <div class="question-number" id="questionNumberText">Pertanyaan 1 dari 10</div>
            <div class="question-text" id="questionText">Klik NEXT untuk memulai quiz!</div>
            <div class="options" id="options"></div>
            <div style="text-align: center; margin-top: 2rem;">
                <button class="btn btn-primary" id="nextBtn" style="display: none;">NEXT →</button>
            </div>
        </div>
    </div>

    <!-- Result Modal -->
    <div class="result-modal" id="resultModal">
        <div class="result-card">
            <h2>🎉 Quiz Selesai!</h2>
            <div class="result-score" id="finalScore">85%</div>
            <p id="resultMessage"></p>
            <div style="margin: 2rem 0;">
                <button class="btn btn-primary" id="playAgainBtn">Main Lagi</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-text">Created by <strong>Ramadhan</strong></div>
    </footer>

    <script>
        const quizData = [
            {
                question: "Siapa presiden pertama Indonesia?",
                options: ["Soekarno", "Soeharto", "Habibie", "Megawati"],
                correct: 0
            },
            {
                question: "Berapa jumlah planet di tata surya?",
                options: ["7", "8", "9", "10"],
                correct: 1
            },
            {
                question: "Ibukota Jepang adalah?",
                options: ["Beijing", "Tokyo", "Seoul", "Bangkok"],
                correct: 1
            },
            {
                question: "Air terdiri dari unsur apa?",
                options: ["Oksigen", "Hidrogen", "H2O", "Karbon"],
                correct: 2
            },
            {
                question: "Siapa penemu lampu pijar?",
                options: ["Albert Einstein", "Thomas Edison", "Nikola Tesla", "Isaac Newton"],
                correct: 1
            },
            {
                question: "Berapa sisi pada segitiga?",
                options: ["2", "3", "4", "5"],
                correct: 1
            },
            {
                question: "Gunung tertinggi di dunia?",
                options: ["Gunung Rinjani", "Gunung Merapi", "Everest", "Kilimanjaro"],
                correct: 2
            },
            {
                question: "1 kilometer = berapa meter?",
                options: ["100", "500", "1000", "10000"],
                correct: 2
            },
            {
                question: "Siapa pelukis Mona Lisa?",
                options: ["Picasso", "Van Gogh", "Leonardo da Vinci", "Michelangelo"],
                correct: 2
            },
            {
                question: "Planet terbesar di tata surya?",
                options: ["Mars", "Jupiter", "Saturnus", "Neptunus"],
                correct: 1
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let selectedAnswer = null;

        const elements = {
            questionText: document.getElementById('questionText'),
            options: document.getElementById('options'),
            nextBtn: document.getElementById('nextBtn'),
            questionNum: document.getElementById('questionNum'),
            scoreNum: document.getElementById('scoreNum'),
            progressFill: document.getElementById('progressFill'),
            questionNumberText: document.getElementById('questionNumberText'),
            resultModal: document.getElementById('resultModal'),
            finalScore: document.getElementById('finalScore'),
            resultMessage: document.getElementById('resultMessage'),
            playAgainBtn: document.getElementById('playAgainBtn')
        };

        function loadQuestion() {
            const q = quizData[currentQuestion];
            
            elements.questionText.textContent = q.question;
            elements.questionNumberText.textContent = `Pertanyaan ${currentQuestion + 1} dari ${quizData.length}`;
            elements.questionNum.textContent = currentQuestion + 1;
            elements.scoreNum.textContent = score;
            
            // Update progress
            const progress = ((currentQuestion) / quizData.length) * 100;
            elements.progressFill.style.width = progress + '%';

            // Load options
            elements.options.innerHTML = '';
            q.options.forEach((option, index) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = option;
                btn.dataset.index = index;
                btn.addEventListener('click', () => selectAnswer(index));
                elements.options.appendChild(btn);
            });

            elements.nextBtn.style.display = 'none';
            selectedAnswer = null;
        }

        function selectAnswer(index) {
            if (selectedAnswer !== null) return;

            selectedAnswer = index;
            const options = document.querySelectorAll('.option');
            
            options.forEach((option, i) => {
                if (i === quizData[currentQuestion].correct) {
                    option.classList.add('correct');
                } else if (i === index) {
                    option.classList.add('selected');
                    if (i !== quizData[currentQuestion].correct) {
                        option.classList.add('incorrect');
                    }
                }
            });

            elements.nextBtn.style.display = 'inline-block';
        }

        function nextQuestion() {
            if (selectedAnswer === quizData[currentQuestion].correct) {
                score++;
            }

            currentQuestion++;
            
            if (currentQuestion < quizData.length) {
                setTimeout(loadQuestion, 1000);
            } else {
                showResult();
            }
        }

        function showResult() {
            const percentage = Math.round((score / quizData.length) * 100);
            elements.finalScore.textContent = percentage + '%';
            
            let message = '';
            if (percentage === 100) message = '🏆 PERFECT SCORE! Genius!';
            else if (percentage >= 80) message = '🎉 Excellent! Sangat bagus!';
            else if (percentage >= 60) message = '👍 Good job! Lumayan!';
            else if (percentage >= 40) message = '📚 Belajar lagi yuk!';
            else message = '😅 Keep practicing!';
            
            elements.resultMessage.textContent = message;
            elements.resultModal.style.display = 'flex';
        }

        // Event Listeners
        elements.nextBtn.addEventListener('click', nextQuestion);
        elements.playAgainBtn.addEventListener('click', () => {
            currentQuestion = 0;
            score = 0;
            elements.resultModal.style.display = 'none';
            loadQuestion();
        });

        // Initialize
        loadQuestion();
    </script>
</body>
</html>
